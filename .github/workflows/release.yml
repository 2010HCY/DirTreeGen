name: "构建发布"

on:
  workflow_dispatch:
    inputs:
      version:
        description: '输入发布版本号'
        required: true
        default: '1.3.0'

jobs:
  build-and-release:
    permissions:
      contents: write
    
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 安装Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 装Linux依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: 装依赖
        run: npm install

      - name: 编译创建Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ github.event.inputs.version }}
          releaseName: 'Dir Tree Gen v${{ github.event.inputs.version }}'
          releaseDraft: true
          prerelease: false