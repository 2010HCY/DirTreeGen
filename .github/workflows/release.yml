name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install neu CLI
        run: npm install -g @neutralinojs/neu
      - name: Build App
        run: neu build
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/dir-tree-gen/dir-tree-gen-win_*
            dist/dir-tree-gen/dir-tree-gen-linux_*
            dist/dir-tree-gen/dir-tree-gen-mac_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}